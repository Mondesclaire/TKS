name: Update Plots

on:
  push:
    branches: [ main ] # Запускать при пуше в main
  schedule:
    - cron: '0 0 * * *' # Запускать каждый день в 00:00 (опционально)
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install matplotlib pandas # Установите библиотеки, нужные вашему скрипту

      - name: Run script
        run: python your_script.py # Запуск вашего скрипта

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add plot.png
          git commit -m "Update plot" || exit 0
          git push
